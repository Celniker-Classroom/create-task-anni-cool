<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Pancake House</title>
    <link rel="stylesheet" href="intro.css">
</head>
<body>
<hr>
    <header>
        <h1>Welcome to the Pancake House!</h1>
    </header>
    <hr>
    <main>
        <p>The Pancake House offers a wide variety of delicous pancakes and other delicacies! This is the webpage for online ordering. Please enter in the following information and then select menu to continue.</p>
    <hr> 
<form action="index.html" method="get">
<p>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Your name"/>
<p>
            <label for="Color-Scheme">Color Scheme:</label>
            <select id="color-scheme" name="color-scheme">
                <option value="blue">blue</option>
                <option value="pink">pink</option>
                <option value="green">green</option>
            </select>
<p>
<a href = "index.html"
id="goToIndex">Go to Index</a>

<hr>
<script>
    const colorChoice = document.getElementById("color-scheme");
    const nameInput = document.getElementById("name");
    const goToIndex = document.getElementById("goToIndex");

    goToIndex.addEventListener("click", function () {
        localStorage.setItem("selectedTheme", colorChoice.value);
        localStorage.setItem("customerName", nameInput.value.trim());
    });

</script>
</p>
</form>
</main>
</body>
</html>
