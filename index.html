
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book Wireframe</title>
    <link rel ="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="pancake-title">Pancake House</h1>
    </header>
    <hr>
    <main>
    <section aria-label="Choose your batter:">
    <h3>Choose your batter:</h3>
    <div class="checkbox-list">
            <label>
                <input type="checkbox" id="gluten-free" value="Gluten-Free">
                Gluten-Free ($5.25)
            </label>
            <label>
                <input type="checkbox" id="whole-wheat" value="Whole-Wheat">
                Whole-Wheat ($4.50)
            </label>
            <label>
                <input type="checkbox" id="buttermilk" value="Buttermilk">
                Buttermilk ($4.50)
            </label>
        </div>
    </section>
   <hr>
   <section aria-label="Choose fillings:">
   <h3>Choose your fillings:</h3>
   <div class="checkbox-list">
            <label>
                <input type="checkbox" id="blueberries" value="Blueberries">
                Blueberries ($0.50)
            </label>
            <label>
                <input type="checkbox" id="chocolate-chip" value="Chocolate Chip">
                Chocolate Chip ($0.50)
            </label>
            <label>
                <input type="checkbox" id="banana" value="Banana">
                Banana ($0.50)
            </label>
        </div>
        </section>
   <hr>
   <section aria-label="Choose toppings:">
   <h3>Choose your toppings:</h3>
      <div class="checkbox-list">
            <label>
                <input type="checkbox" id="maple-syrup" value="Maple Syrup">
                Maple Syrup ($0.50)
            </label>
            <label>
                <input type="checkbox" id="whipped-cream" value="Whipped Cream">
                Whipped Cream ($0.75)
            </label>
            <label>
                <input type="checkbox" id="butter" value="Butter">
                Butter ($0.50)
            </label>
        </div>
        </section>
   <hr>
    <section aria-label="Choose sides:">
    <h3>Choose your sides:</h3>
    <div class="checkbox-list">
            <label>
                <input type="checkbox" id="eggs" value="Eggs">
                Eggs ($2.00)
            </label>
            <label>
                <input type="checkbox" id="bacon" value="Bacon">
                Bacon ($2.50)
            </label>
            <label>
                <input type="checkbox" id="sausage" value="Sausage">
                Sausage ($2.00)
            </label>
    </div>
    </section>
    <hr>
    <div class="total-row">
        <h2>Final Cost: $<span id="final-cost">0.00</span></h2>
        <button id="btnCalc" type="button">Calculate Total</button>
    </div>
    <hr>
    </main>
    <script src="script.js"></script>
</body>
</html>
